# ──────────────────────────────────────────
# Network
# ──────────────────────────────────────────
networks:
  crud_network:
    driver: bridge
    name: crud_network

# ──────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────
volumes:
  db_data:
  backend_storage:
  php_vendor:

# ──────────────────────────────────────────
# Services
# ──────────────────────────────────────────
services:

  # ── Traefik (reverse proxy / edge router) ──
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP traffic
      - "8080:8080"   # Traefik dashboard
    volumes:
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - crud_network

  # ── MySQL Database ──
  db:
    image: mysql:8.0
    container_name: crud_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-crud_db}
      MYSQL_USER: ${DB_USERNAME:-crud_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - crud_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PHP-FPM (Laravel) ──
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: crud_php
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-crud_db}
      DB_USERNAME: ${DB_USERNAME:-crud_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - ./backend:/var/www/html
      - php_vendor:/var/www/html/vendor
      - backend_storage:/var/www/html/storage
    networks:
      - crud_network
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx (serves Laravel via PHP-FPM) ──
  nginx:
    image: nginx:1.25-alpine
    container_name: crud_nginx
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/conf.d/app.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - crud_network
    depends_on:
      - php

  # ── Vue Frontend (built with Node, served by Nginx) ──
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: crud_frontend
    restart: unless-stopped
    networks:
      - crud_network
    depends_on:
      - nginx
